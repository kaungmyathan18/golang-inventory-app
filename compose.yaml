services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=6h
      - --web.enable-lifecycle
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
  pyroscope:
    image: grafana/pyroscope:1.7.1
    ports:
      - "4040:4040"
  tempo:
    image: grafana/tempo:2.6.1
    user: "0:0"
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
  loki:
    image: grafana/loki:3.2.1
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./docker/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
  promtail:
    image: grafana/promtail:3.2.1
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./docker/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
    depends_on:
      tempo:
        condition: service_started
  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      pyroscope:
        condition: service_started
      tempo:
        condition: service_started
      otel-collector:
        condition: service_started
      loki:
        condition: service_started
      promtail:
        condition: service_started
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
      DB_DSN: file:/data/app.db?_foreign_keys=on
      REDIS_ADDR: redis:6379
      LOG_FORMAT: json
    depends_on:
      redis:
        condition: service_started
      prometheus:
        condition: service_started
      pyroscope:
        condition: service_started
      tempo:
        condition: service_started
      otel-collector:
        condition: service_started
      grafana:
        condition: service_started

    volumes:
      - sqlite-data:/data
volumes:
  sqlite-data:
  redis-data:
  loki-data:
