name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Go checks
        run: |
          go mod verify
          go vet ./...
          make test-cover
          make test-e2e

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: app:ci

      - name: Trivy filesystem
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Trivy image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: app:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
