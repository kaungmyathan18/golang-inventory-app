# Deploy container to Amazon ECS (ECR + OIDC).
#
# Prerequisites (GitHub repo):
#   Secret:  AWS_ROLE_ARN — IAM role ARN trusted for GitHub OIDC (sts:AssumeRoleWithWebIdentity).
#   Variables (Settings → Secrets and variables → Actions → Variables):
#     AWS_REGION, ECR_REPOSITORY, ECS_CLUSTER, ECS_SERVICE
#
# Your ECS task definition should reference this ECR repository (image may use :latest;
# this workflow pushes both the commit SHA tag and :latest).
#
# OIDC setup: https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services

name: Deploy to ECS

on:
  workflow_dispatch:
  # Uncomment to deploy on every push to main:
  # push:
  #   branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"
